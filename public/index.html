<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Manager</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #2b6cb0;
      --primary-light: #4aa3ff;
      --primary-dark: #1e4d8b;
      --success: #22a346;
      --danger: #cb2431;
      --bg-dark: #0f172a;
      --bg-card: #1e293b;
      --bg-input: #0f172a;
      --border: #334155;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --radius: 8px;
      --transition: all 0.3s ease;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      background: linear-gradient(135deg, var(--bg-dark), #1a2847);
      color: var(--text);
      min-height: 100vh;
    }

    .hidden {
      display: none !important;
    }

    /* Header */
    header {
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      transform: translateY(0);
      transition: var(--transition);
    }

    header.minimized {
      padding: 12px 20px;
    }

    header h1 {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    /* Login & Auth */
    #login-section {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-box {
      background: var(--bg-card);
      padding: 40px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      max-width: 400px;
      width: 100%;
    }

    .login-box h2 {
      margin-bottom: 30px;
      font-size: 24px;
    }

    /* Form Elements */
    input, textarea, select {
      width: 100%;
      padding: 12px;
      margin-bottom: 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-input);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      transition: var(--transition);
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--primary-light);
      box-shadow: 0 0 0 3px rgba(43, 108, 176, 0.1);
      background: var(--bg-card);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    /* Buttons */
    button {
      padding: 12px 24px;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: var(--transition);
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      box-shadow: 0 2px 8px rgba(43, 108, 176, 0.2);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(43, 108, 176, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    button.danger {
      background: linear-gradient(135deg, var(--danger), #e74c3c);
    }

    button.success {
      background: linear-gradient(135deg, var(--success), #27ae60);
    }

    button.secondary {
      background: var(--border);
      color: var(--text);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Dashboard */
    #dashboard {
      padding: 0;
      min-height: 100vh;
    }

    /* Search Section */
    .search-container {
      display: flex;
      justify-content: center;
      padding: 60px 20px;
      transition: var(--transition);
    }

    .search-container.minimized {
      padding: 20px;
    }

    .search-box {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 500px;
    }

    .search-box input {
      flex: 1;
      margin: 0;
      padding: 14px 18px;
      font-size: 16px;
    }

    .search-box button {
      padding: 12px 28px;
      white-space: nowrap;
    }

    /* Recipes Container */
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Recipe List */
    .recipes-list {
      display: grid;
      gap: 16px;
    }

    .recipe-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      cursor: pointer;
      transition: var(--transition);
      border-left: 4px solid var(--primary);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .recipe-card:hover {
      border-color: var(--primary-light);
      box-shadow: 0 4px 16px rgba(43, 108, 176, 0.2);
      transform: translateY(-2px);
    }

    .recipe-info {
      flex: 1;
    }

    .recipe-name {
      font-size: 18px;
      font-weight: 600;
      color: var(--primary-light);
      margin-bottom: 8px;
    }

    .recipe-meta {
      display: flex;
      gap: 16px;
      margin-bottom: 8px;
      color: var(--text-muted);
      font-size: 14px;
    }

    .recipe-ingredients {
      color: var(--text-muted);
      font-size: 13px;
      margin-top: 8px;
    }

    .recipe-actions {
      display: flex;
      gap: 8px;
      margin-left: 16px;
    }

    .recipe-actions button {
      padding: 8px 16px;
      font-size: 12px;
    }

    /* Modals */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: var(--bg-card);
      border-radius: var(--radius);
      max-height: 90vh;
      overflow-y: auto;
      width: 100%;
      max-width: 600px;
      border: 1px solid var(--border);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .modal-header {
      padding: 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h2 {
      margin: 0;
      font-size: 22px;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 24px;
      cursor: pointer;
      padding: 0;
      box-shadow: none;
    }

    .modal-close:hover {
      color: var(--text);
      transform: none;
    }

    .modal-content {
      padding: 24px;
    }

    .modal-footer {
      padding: 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    /* Recipe Detail */
    .recipe-detail-section {
      margin-bottom: 24px;
    }

    .recipe-detail-section h3 {
      font-size: 16px;
      color: var(--primary-light);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .recipe-detail-section p {
      line-height: 1.6;
      color: var(--text-muted);
    }

    .ingredient-item {
      padding: 8px 0;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
    }

    .ingredient-item:last-child {
      border-bottom: none;
    }

    .step-item {
      padding: 12px;
      margin-bottom: 8px;
      background: var(--bg-dark);
      border-left: 3px solid var(--primary);
      border-radius: 4px;
      line-height: 1.6;
    }

    /* Form Sections */
    .form-section {
      margin-bottom: 24px;
    }

    .form-section label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 14px;
      color: var(--primary-light);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .form-row.full {
      grid-template-columns: 1fr;
    }

    .ingredient-input-group {
      display: grid;
      grid-template-columns: 1fr 0.8fr 0.8fr auto;
      gap: 8px;
      margin-bottom: 12px;
      align-items: end;
    }

    .ingredient-input-group input {
      margin-bottom: 0;
    }

    .ingredient-remove-btn {
      padding: 10px 12px;
      background: var(--danger);
      font-size: 12px;
    }

    .steps-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .step-input-group {
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .step-input-group textarea {
      flex: 1;
      margin-bottom: 0;
      min-height: 60px;
    }

    .step-remove-btn {
      padding: 10px 12px;
      background: var(--danger);
      font-size: 12px;
      align-self: center;
    }

    .add-btn-row {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }

    .add-btn-row button {
      flex: 1;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state h2 {
      font-size: 24px;
      margin-bottom: 12px;
      color: var(--text);
    }

    /* Utilities */
    .text-muted {
      color: var(--text-muted);
    }

    .mb-20 {
      margin-bottom: 20px;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .search-box {
        flex-direction: column;
      }

      .recipe-card {
        flex-direction: column;
        align-items: flex-start;
      }

      .recipe-actions {
        margin-left: 0;
        margin-top: 12px;
        width: 100%;
      }

      .recipe-actions button {
        flex: 1;
      }

      .form-row,
      .ingredient-input-group {
        grid-template-columns: 1fr;
      }

      .ingredient-input-group {
        grid-template-columns: 1fr auto;
      }

      .modal {
        max-width: 100%;
      }
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .topbar-right {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .user-info {
      font-size: 14px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <!-- Login Section -->
  <div id="login-section">
    <div class="login-box">
      <h2>🍳 Recipe Manager</h2>
      <form id="login-form" onsubmit="handleLogin(event)">
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
      </form>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="hidden">
    <header>
      <h1>🍳 Recipe Manager</h1>
    </header>

    <div class="search-container" id="searchContainer">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search recipes...">
        <button onclick="handleSearch()">Search</button>
        <button class="success" onclick="openAddRecipeModal()">+ Add Recipe</button>
      </div>
    </div>

    <div class="container">
      <div class="topbar">
        <div></div>
        <div class="topbar-right">
          <span class="user-info" id="userInfo"></span>
          <button class="secondary" onclick="handleLogout()">Logout</button>
        </div>
      </div>

      <div id="recipesContainer">
        <div class="empty-state">
          <h2>No recipes yet</h2>
          <p>Create your first recipe to get started!</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Recipe Detail Modal -->
  <div id="detailModal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="detailTitle"></h2>
        <button class="modal-close" onclick="closeDetailModal()">×</button>
      </div>
      <div class="modal-content" id="detailContent"></div>
      <div class="modal-footer">
        <button class="secondary" onclick="closeDetailModal()">Close</button>
        <button class="danger" onclick="deleteRecipe()">Delete Recipe</button>
      </div>
    </div>
  </div>

  <!-- Add/Edit Recipe Modal -->
  <div id="formModal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="formTitle">Add New Recipe</h2>
        <button class="modal-close" onclick="closeFormModal()">×</button>
      </div>
      <div class="modal-content">
        <form id="recipeForm" onsubmit="handleSaveRecipe(event)">
          <div class="form-section">
            <label>Recipe Name *</label>
            <input type="text" id="recipeName" placeholder="e.g., Chocolate Brownies" required>
          </div>

          <div class="form-section">
            <label>Preparation Time (minutes)</label>
            <input type="number" id="prepTime" placeholder="e.g., 30" min="0">
          </div>

          <div class="form-section">
            <label>Ingredients *</label>
            <div id="ingredientsContainer"></div>
            <button type="button" class="secondary" onclick="addIngredientInput()">+ Add Ingredient</button>
          </div>

          <div class="form-section">
            <label>Preparation Steps</label>
            <div id="prepStepsContainer"></div>
            <button type="button" class="secondary" onclick="addPrepStepInput()">+ Add Preparation Step</button>
          </div>

          <div class="form-section">
            <label>Cooking Steps *</label>
            <div id="cookingStepsContainer"></div>
            <button type="button" class="secondary" onclick="addCookingStepInput()">+ Add Cooking Step</button>
          </div>

          <div class="form-section">
            <label>Extra Notes</label>
            <textarea id="notes" placeholder="Any additional notes or tips..."></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="secondary" onclick="closeFormModal()">Cancel</button>
        <button class="success" onclick="document.getElementById('recipeForm').dispatchEvent(new Event('submit'))">Save Recipe</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
